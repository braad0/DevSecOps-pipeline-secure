name: Security Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  security-events: write
  contents: read
  actions: read

jobs:

# -------------------------------------------------------
# JOB 1 — SAST : Analyse statique avec Bandit
# -------------------------------------------------------
  sast:
    name: SAST — Bandit
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Bandit
        run: pip install bandit[sarif]

      - name: Run Bandit
        run: |
          bandit -r app/ \
            -f sarif \
            -o bandit-results.sarif \
            --severity-level medium \
            || true

      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: bandit-results.sarif
        if: always()

      - name: Run Bandit (Security Gate)
        run: |
          bandit -r app/ \
            --severity-level high \
            --exit-zero=false
        continue-on-error: false

      - name: Upload Bandit JSON report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-report-${{ matrix.python-version }}
          path: bandit-results.sarif

# -------------------------------------------------------
# JOB 2 — SCA : Dépendances vulnérables avec pip-audit
# -------------------------------------------------------
  sca:
    name: SCA — pip-audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Run pip-audit
        run: |
          pip-audit \
            -r app/requirements.txt \
            -f json \
            -o pip-audit-results.json \
            || true

      - name: Security Gate — fail on critical CVEs
        run: |
          python -c "
          import json, sys
          with open('pip-audit-results.json') as f:
              data = json.load(f)
          vulns = [
              v for dep in data.get('dependencies', [])
              for v in dep.get('vulns', [])
          ]
          print(f'Vulnerabilities found: {len(vulns)}')
          if vulns:
              for v in vulns:
                  print(f'  - {v[\"id\"]} : {v.get(\"description\", \"\")[:80]}')
              sys.exit(1)
          "

      - name: Upload pip-audit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pip-audit-report
          path: pip-audit-results.json

# -------------------------------------------------------
# JOB 3 — SECRETS : Scan de secrets avec TruffleHog
# -------------------------------------------------------
  secrets:
    name: Secrets — TruffleHog
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run TruffleHog
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          extra_args: --only-verified

# -------------------------------------------------------
# JOB 4 — LINT : Qualité de code avec flake8
# -------------------------------------------------------
  lint:
    name: Lint — flake8
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install flake8
        run: pip install flake8

      - name: Run flake8
        run: |
          flake8 app/ \
            --max-line-length=120 \
            --statistics \
            --count \
            || true

# -------------------------------------------------------
# JOB 5 — REPORT : Agrégation des résultats
# -------------------------------------------------------
  report:
    name: Security Report
    runs-on: ubuntu-latest
    needs: [sast, sca, secrets, lint]
    if: always()

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download Bandit report
        uses: actions/download-artifact@v4
        with:
          name: bandit-report-3.12
          path: reports/
        continue-on-error: true

      - name: Download pip-audit report
        uses: actions/download-artifact@v4
        with:
          name: pip-audit-report
          path: reports/
        continue-on-error: true

      - name: Generate Security Report
        run: python scripts/generate_report.py
        env:
          GITHUB_SHA:        ${{ github.sha }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          SAST_STATUS:       ${{ needs.sast.result }}
          SCA_STATUS:        ${{ needs.sca.result }}
          SECRETS_STATUS:    ${{ needs.secrets.result }}
          LINT_STATUS:       ${{ needs.lint.result }}

      - name: Upload Security Report
        uses: actions/upload-artifact@v4
        with:
          name: security-report
          path: |
            security-report.json
            security-report.md
