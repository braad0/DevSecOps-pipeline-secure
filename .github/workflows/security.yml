name: Security Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  security-events: write
  contents: read
  actions: read

env:
  src_dir: app
  requirements_path: app/requirements.txt

jobs:

  # -------------------------------------------------------
  # JOB 1 — SAST : Analyse statique avec Bandit
  # -------------------------------------------------------
  sast:
    name: SAST — Bandit
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Ensure source dir exists
        run: |
          if [ ! -d "${{ env.src_dir }}" ]; then
            echo "Source directory '${{ env.src_dir }}' not found (Bandit will be skipped gracefully)."
          fi

      - name: Install Bandit
        run: |
          python -m pip install --upgrade pip
          pip install "bandit[sarif]"

      - name: Run Bandit (report for Security tab)
        run: |
          if [ -d "${{ env.src_dir }}" ]; then
            bandit -r "${{ env.src_dir }}/" \
              -f sarif \
              -o bandit-results.sarif \
              --severity-level medium \
              || true
          else
            echo '{}' > bandit-results.sarif
          fi

      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: bandit-results.sarif
        if: always()

      - name: Run Bandit (Security Gate)
        run: |
          if [ -d "${{ env.src_dir }}" ]; then
            bandit -r "${{ env.src_dir }}/" \
              --severity-level high
          else
            echo "Skipping Bandit gate: source dir missing"
          fi
        continue-on-error: false

      - name: Upload Bandit SARIF artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-report-${{ matrix.python-version }}
          path: bandit-results.sarif

  # -------------------------------------------------------
  # JOB 2 — SCA : Dépendances vulnérables avec pip-audit
  # -------------------------------------------------------
  sca:
    name: SCA — pip-audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pip-audit
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit

      - name: Run pip-audit
        run: |
          set -e
          if [ -f "${{ env.requirements_path }}" ]; then
            if ! pip-audit -r "${{ env.requirements_path }}" -f json > pip-audit-results.json; then
              echo '{"dependencies":[]}' > pip-audit-results.json
            fi
          else
            echo "Requirements not found at ${{ env.requirements_path }}, auditing environment instead."
            if ! pip-audit -f json > pip-audit-results.json; then
              echo '{"dependencies":[]}' > pip-audit-results.json
            fi
          fi

      - name: Security Gate — fail on CVEs
        run: |
          python - <<'PY'
          import json, sys, os
          path = 'pip-audit-results.json'
          if not os.path.exists(path) or os.path.getsize(path) == 0:
              print('pip-audit-results.json missing or empty, treating as no vulns.')
              sys.exit(0)
          try:
              with open(path, 'r', encoding='utf-8') as f:
                  raw = f.read().strip()
              if not raw:
                  print('Empty JSON, treating as no vulns.')
                  sys.exit(0)
              data = json.loads(raw)
          except Exception as e:
              print(f'Failed to parse {path}: {e}')
              # Ne pas faire échouer le pipeline pour un parsing imprévu
              sys.exit(0)
          vulns = [ v for dep in data.get('dependencies', []) for v in dep.get('vulns', []) ]
          print(f'Vulnerabilities found: {len(vulns)}')
          if vulns:
              for v in vulns:
                  vid = v.get('id') or (v.get('aliases') or ['UNKNOWN'])[0]
                  desc = (v.get('description') or '')[:120].replace('\n',' ')
                  print(f'  - {vid}: {desc}')
              sys.exit(1)
          PY

      - name: Upload pip-audit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pip-audit-report
          path: pip-audit-results.json

  # -------------------------------------------------------
  # JOB 3 — SECRETS : Scan de secrets avec TruffleHog
  # -------------------------------------------------------
  secrets:
    name: Secrets — TruffleHog
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run TruffleHog
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          extra_args: --only-verified

  # -------------------------------------------------------
  # JOB 4 — LINT : Qualité de code avec flake8
  # -------------------------------------------------------
  lint:
    name: Lint — flake8
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install flake8
        run: |
          python -m pip install --upgrade pip
          pip install flake8

      - name: Run flake8
        run: |
          if [ -d "${{ env.src_dir }}" ]; then
            flake8 "${{ env.src_dir }}/" \
              --max-line-length=120 \
              --statistics \
              --count \
              || true
          else
            echo "Skipping flake8: source dir missing"
          fi

  # -------------------------------------------------------
  # JOB 5 — REPORT : Agrégation des résultats
  # -------------------------------------------------------
  report:
    name: Security Report
    runs-on: ubuntu-latest
    needs: [sast, sca, secrets, lint]
    if: always()

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download Bandit report (3.12)
        uses: actions/download-artifact@v4
        with:
          name: bandit-report-3.12
          path: reports/
        continue-on-error: true

      - name: Download pip-audit report
        uses: actions/download-artifact@v4
        with:
          name: pip-audit-report
          path: reports/
        continue-on-error: true

      - name: List reports dir (debug)
        run: |
          ls -la || true
          ls -la reports || true

      - name: Install report deps (if needed)
        run: |
          if [ -f "requirements.txt" ]; then
            python -m pip install --upgrade pip
            pip install -r requirements.txt || true
          fi

      - name: Generate Security Report
        run: |
          if [ -f "scripts/generate_report.py" ]; then
            python scripts/generate_report.py
          else
            echo '{"summary":"No generator found"}' > security-report.json
            printf "# Security Report\n\nNo generator found.\n" > security-report.md
          fi
        env:
          GITHUB_SHA:        ${{ github.sha }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          SAST_STATUS:       ${{ needs.sast.result }}
          SCA_STATUS:        ${{ needs.sca.result }}
          SECRETS_STATUS:    ${{ needs.secrets.result }}
          LINT_STATUS:       ${{ needs.lint.result }}

      - name: Upload Security Report
        uses: actions/upload-artifact@v4
        with:
          name: security-report
          path: |
            security-report.json
            security-report.md
